name: run pd count

on:
  schedule:
    - cron: '0 11 * * *'  # everyday
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run against and push updates to'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: determine target branch
        id: target_branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content to github runner
        with:
          ref: ${{ steps.target_branch.outputs.branch }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # install the python version needed
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          
      - name: execute py script # run pd_count.py and corporate_report.py
        
        run:  python Corporate_reporting/pd_count/pd_count.py
          
          
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "updates" --allow-empty
          git push origin HEAD:${{ steps.target_branch.outputs.branch }}
       
